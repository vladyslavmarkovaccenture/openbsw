name: Python unit tests

on:
  push:
    branches:
      - main
    paths:
      - '.ci/**/*.py'
      - '.github/workflows/python-unit-tests.yml'
  pull_request:
    paths:
      - '.ci/**/*.py'
      - '.github/workflows/python-unit-tests.yml'

jobs:
  python-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run .ci Python unit tests
        run: python3 -m unittest discover -s .ci/test -p 'test_*.py'